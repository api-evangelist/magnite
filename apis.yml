aid: magnite
name: Magnite
description: 'Magnite, Inc. (NASDAQ: MGNI) is the world''s largest independent sell-side
  advertising platform, headquartered in New York with major operations in Los Angeles.
  Formed in 2020 from the merger of Rubicon Project and Telaria, and expanded through
  the acquisitions of SpotX (2021), SpringServe (2021), and Streamr.ai (2025), Magnite
  operates an omnichannel SSP spanning Connected TV (CTV), online video, display,
  audio, and mobile in-app. Its flagship offering is the Magnite Streaming platform
  — a next-generation CTV/OTT solution that unifies the SpringServe ad server with
  Magnite''s Streaming SSP — alongside DV+ for display/video web and mobile, ClearLine
  for agency self-service direct buying of premium video, and Magnite Access for first-
  and third-party data activation. Magnite connects publishers including Disney Advertising,
  Paramount, Roku, Samsung, LG Ad Solutions, and Warner Bros. Discovery to virtually
  all major DSPs, and Jounce Media''s March 2025 Supply Path Benchmarking Report verified
  Magnite reaches 99% of US streaming supply on a dollar-weighted basis. The company
  exposes developer surfaces through the SpringServe REST API, the Magnite Streaming
  Public API, the Magnite Seller Platform / CTV Platform Public APIs, an OpenRTB v2.5
  bidder integration, and iOS/Android in-app SDKs. Most API reference material is
  gated behind authenticated partner accounts; no canonical OpenAPI document is publicly
  published. In Q1 2026 Magnite reported $164.4M revenue with CTV crossing 51% of
  contribution ex-TAC for the first time.'
